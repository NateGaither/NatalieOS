<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatalieOS Control Center</title>
    <style>
        :root {
            --bg: #0f0f12;
            --card: #1a1a1f;
            --accent: #ff66b2;
            --text: #e0e0e0;
            --local: #4ade80;
            --cloud: #60a5fa;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20  px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 90%; max-width: 1000px; }

        /* Status & Mood Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
        }

        .bar-container {
            background: #333;
            height: 12px;
            border-radius: 6px;
            margin: 10px 0;
            overflow: hidden;
        }

        .bar { height: 100%; transition: width 0.5s ease; background: var(--accent); }

        /* History Table */
        .history-section {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            max-height: 500px;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; border-bottom: 2px solid #333; padding: 10px; color: #888; }
        td { padding: 12px 10px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }

        .brain-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .tag-local { background: rgba(74, 222, 128, 0.2); color: var(--local); }
        .tag-cloud { background: rgba(96, 165, 250, 0.2); color: var(--cloud); }

        /* Manual Input */
        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input {
            flex-grow: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
        }

        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>NatalieOS <small style="font-size: 0.5em; color: var(--accent);">v2.0 Persistence</small></h1>

    <div class="stats-grid">
        <div class="card">
            <h3>Status</h3>
            <div id="status">IDLE</div>
            <div id="current-brain" style="margin-top:10px; font-size: 0.8em;">...</div>
        </div>
        <div class="card">
            <h3>Sass Level</h3>
            <div class="bar-container"><div id="sass-bar" class="bar" style="width: 50%;"></div></div>
            <span id="sass-val">50%</span>
        </div>
        <div class="card">
            <h3>Cute Level</h3>
            <div class="bar-container"><div id="cute-bar" class="bar" style="width: 50%;"></div></div>
            <span id="cute-val">50%</span>
        </div>
    </div>

    <div class="history-section">
        <h3>Session History (from Disk)</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Natalie</th>
                    <th>Brain</th>
                    <th>Lat</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <div class="input-area">
        <input type="text" id="manual-text" placeholder="Type to Natalie...">
        <button onclick="sendManual()">Send</button>
    </div>
</div>

<script>
    async function updateDashboard() {
        try {
            // Update Stats
            const statsRes = await fetch('/stats');
            const stats = await statsRes.json();
            
            document.getElementById('status').innerText = stats.status;
            document.getElementById('current-brain').innerText = stats.brain;
            document.getElementById('sass-bar').style.width = stats.sass + "%";
            document.getElementById('sass-val').innerText = stats.sass + "%";
            document.getElementById('cute-bar').style.width = stats.cute + "%";
            document.getElementById('cute-val').innerText = stats.cute + "%";

            // Update History Table
            const historyRes = await fetch('/history');
            const history = await historyRes.json();
            const body = document.getElementById('history-body');
            
            // We reverse it so the newest messages are at the top
            body.innerHTML = history.slice().reverse().map(entry => `
                <tr>
                    <td>${entry.timestamp}</td>
                    <td>${entry.user}</td>
                    <td style="color: var(--accent)">${entry.natalie}</td>
                    <td><span class="brain-tag ${entry.brain.includes('LOCAL') ? 'tag-local' : 'tag-cloud'}">${entry.brain}</span></td>
                    <td>${entry.latency}s</td>
                </tr>
            `).join('');

        } catch (e) { console.error("Update failed", e); }
    }

    async function sendManual() {
        const input = document.getElementById('manual-text');
        const text = input.value;
        if (!text) return;

        await fetch('/manual', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text})
        });
        input.value = '';
    }

    // Refresh every 2 seconds
    setInterval(updateDashboard, 2000);
    updateDashboard();
</script>

</body>
</html>
